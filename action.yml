name: 'XploitScan Security Scanner'
description: 'Scan your code for security vulnerabilities with 30 core rules (up to 131 with Pro). Built for AI-generated code. Outputs SARIF for GitHub Security tab.'
author: 'Cipherline LLC'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to scan (default: current directory)'
    required: false
    default: '.'
  fail-on:
    description: 'Fail the action if findings of this severity or higher are found: critical, high, medium, low, none (default: none)'
    required: false
    default: 'none'
  sarif-file:
    description: 'Path to write SARIF output (default: xploitscan-results.sarif)'
    required: false
    default: 'xploitscan-results.sarif'
  comment:
    description: 'Post a summary comment on pull requests (default: true)'
    required: false
    default: 'true'
  api-key:
    description: 'XploitScan API key (xpls_...) — generate one in Settings → API Keys. Required to unlock the full 131-rule Pro set; without it the action runs the 30 free rules.'
    required: false
    default: ''

outputs:
  grade:
    description: 'Security grade (A+ to F)'
  score:
    description: 'Security score (0-100)'
  findings-count:
    description: 'Total number of findings'
  critical-count:
    description: 'Number of critical findings'
  high-count:
    description: 'Number of high findings'
  medium-count:
    description: 'Number of medium findings'
  low-count:
    description: 'Number of low findings'
  sarif-file:
    description: 'Path to the SARIF output file'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run XploitScan
      id: scan
      shell: bash
      env:
        XPLOITSCAN_API_KEY: ${{ inputs.api-key }}
      run: |
        # Install xploitscan
        npm install -g xploitscan@^1.0.0 2>/dev/null || npx --yes xploitscan@^1.0.0 --version

        # Run scan with JSON output to a temp file (exit code 1 = findings found, not an error)
        SCAN_JSON=$(mktemp)
        npx --yes xploitscan@^1.0.0 scan "${{ inputs.path }}" --format json --no-ai 1>"$SCAN_JSON" 2>/dev/null || true

        # Parse results — compute grade/score/counts from findings since CLI JSON doesn't include them
        eval "$(node -e "
          try {
            const j = JSON.parse(require('fs').readFileSync('$SCAN_JSON', 'utf8'));
            const f = j.findings || [];
            const critical = f.filter(x => x.severity === 'critical').length;
            const high = f.filter(x => x.severity === 'high').length;
            const medium = f.filter(x => x.severity === 'medium').length;
            const low = f.filter(x => x.severity === 'low').length;
            const total = f.length;
            const files = j.filesScanned || 0;
            // Scoring matches the web dashboard modal and the CLI calculateGrade function.
            // Keep all three in sync — changing one without the others will produce
            // inconsistent grades between CI, terminal, and the web UI.
            const score = Math.max(0, 100 - (critical * 15) - (high * 7) - (medium * 3) - (low * 1));
            let grade = score >= 97 ? 'A+' : score >= 90 ? 'A' : score >= 80 ? 'B' : score >= 70 ? 'C' : score >= 60 ? 'D' : 'F';
            // Severity caps — a scan with serious findings cannot earn a clean grade
            // regardless of score math.
            const order = ['A+', 'A', 'B', 'C', 'D', 'F'];
            const capTo = (cap) => { if (order.indexOf(grade) < order.indexOf(cap)) grade = cap; };
            if (critical >= 1) capTo('D');
            else if (high >= 3) capTo('D');
            else if (high >= 1) capTo('B');
            else if (medium >= 5) capTo('B');
            else if (medium >= 1) capTo('A');
            console.log('GRADE=' + grade);
            console.log('SCORE=' + score);
            console.log('FINDINGS=' + total);
            console.log('CRITICAL=' + critical);
            console.log('HIGH=' + high);
            console.log('MEDIUM=' + medium);
            console.log('LOW=' + low);
          } catch(e) {
            console.log('GRADE=?');
            console.log('SCORE=0');
            console.log('FINDINGS=0');
            console.log('CRITICAL=0');
            console.log('HIGH=0');
            console.log('MEDIUM=0');
            console.log('LOW=0');
          }
        ")"
        rm -f "$SCAN_JSON"

        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "findings-count=$FINDINGS" >> $GITHUB_OUTPUT
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=$HIGH" >> $GITHUB_OUTPUT
        echo "medium-count=$MEDIUM" >> $GITHUB_OUTPUT
        echo "low-count=$LOW" >> $GITHUB_OUTPUT
        echo "sarif-file=${{ inputs.sarif-file }}" >> $GITHUB_OUTPUT

        # Generate SARIF output (exit code 1 = findings found, not an error)
        npx --yes xploitscan@^1.0.0 scan "${{ inputs.path }}" --format sarif --no-ai > "${{ inputs.sarif-file }}" 2>/dev/null || true
        # If SARIF file is empty or doesn't exist, write a valid empty SARIF
        if [ ! -s "${{ inputs.sarif-file }}" ]; then
          echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"XploitScan","version":"1.0.0","rules":[]}},"results":[]}]}' > "${{ inputs.sarif-file }}"
        fi

        # Print summary
        echo ""
        echo "================================="
        echo "XploitScan Results: Grade $GRADE ($SCORE/100)"
        echo "Findings: $FINDINGS (Critical: $CRITICAL, High: $HIGH, Medium: $MEDIUM, Low: $LOW)"
        echo "================================="

        # Also run terminal output for readable logs (exit code 1 = findings, not error)
        npx --yes xploitscan@^1.0.0 scan "${{ inputs.path }}" --no-ai 2>&1 || true

    - name: Upload SARIF to GitHub Security
      if: hashFiles(inputs.sarif-file) != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-file }}
      continue-on-error: true

    - name: Post PR Comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const grade = '${{ steps.scan.outputs.grade }}';
          const score = '${{ steps.scan.outputs.score }}';
          const findings = '${{ steps.scan.outputs.findings-count }}';
          const critical = '${{ steps.scan.outputs.critical-count }}';
          const high = '${{ steps.scan.outputs.high-count }}';
          const medium = '${{ steps.scan.outputs.medium-count }}';
          const low = '${{ steps.scan.outputs.low-count }}';

          const gradeEmoji = {'A+':'🟢','A':'🟢','B':'🟡','C':'🟠','D':'🔴','F':'🔴'}[grade] || '⚪';
          const noCodeScanned = grade === '?' && score === '0' && findings === '0';

          const body = noCodeScanned ? [
            `## ⚪ XploitScan Security Report`,
            ``,
            `> **No scannable code found in this PR.** This PR may only contain config, docs, or text changes. XploitScan analyzes source code files (JS, TS, Python, Go, etc.) — non-code changes are automatically skipped.`,
            ``,
            `---`,
            `*Scanned with [XploitScan](https://xploitscan.com) — 30 core security rules for AI-generated code (up to 131 with Pro)*`,
          ].join('\n') : [
            `## ${gradeEmoji} XploitScan Security Report`,
            ``,
            `**Grade: ${grade}** | Score: ${score}/100 | ${findings} finding${findings === '1' ? '' : 's'}`,
            ``,
            `| Severity | Count |`,
            `|----------|-------|`,
            `| 🔴 Critical | ${critical} |`,
            `| 🟠 High | ${high} |`,
            `| 🟡 Medium | ${medium} |`,
            `| 🔵 Low | ${low} |`,
            ``,
            findings === '0'
              ? '> No security issues detected.'
              : `> Run \`npx xploitscan scan .\` locally for full details with fix suggestions.`,
            ``,
            `---`,
            `*Scanned with [XploitScan](https://xploitscan.com) — 30 core security rules for AI-generated code (up to 131 with Pro)*`,
          ].join('\n');

          // Find existing comment to update (avoid duplicates)
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body && c.body.includes('XploitScan Security Report'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
      continue-on-error: true

    - name: Check failure threshold
      shell: bash
      run: |
        FAIL_ON="${{ inputs.fail-on }}"
        CRITICAL="${{ steps.scan.outputs.critical-count }}"
        HIGH="${{ steps.scan.outputs.high-count }}"
        FINDINGS="${{ steps.scan.outputs.findings-count }}"

        if [ "$FAIL_ON" = "none" ]; then
          echo "XploitScan: No failure threshold set. Passing."
          exit 0
        fi

        if [ "$FAIL_ON" = "critical" ] && [ "$CRITICAL" -gt 0 ] 2>/dev/null; then
          echo "::error::XploitScan found $CRITICAL critical vulnerabilities"
          exit 1
        elif [ "$FAIL_ON" = "high" ] && [ "$((CRITICAL + HIGH))" -gt 0 ] 2>/dev/null; then
          echo "::error::XploitScan found critical/high vulnerabilities (Critical: $CRITICAL, High: $HIGH)"
          exit 1
        elif [ "$FAIL_ON" = "medium" ] && [ "$FINDINGS" -gt 0 ] 2>/dev/null; then
          echo "::error::XploitScan found $FINDINGS vulnerabilities"
          exit 1
        elif [ "$FAIL_ON" = "low" ] && [ "$FINDINGS" -gt 0 ] 2>/dev/null; then
          echo "::error::XploitScan found $FINDINGS vulnerabilities"
          exit 1
        fi

        echo "XploitScan: No findings above the '$FAIL_ON' threshold. Passing."
